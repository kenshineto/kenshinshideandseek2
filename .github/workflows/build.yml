name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: SCM
        uses: actions/checkout@v6

      - name: Setup JDK17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup JDK8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.14'

      - name: Build
        run: gradle :bukkit:shadowJar

      - name: Artifacts
        uses: actions/upload-artifact@v6
        with:
          path: bukkit/build/libs/*.jar


