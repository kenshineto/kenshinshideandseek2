name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        platform: [bukkit, fabric, neoforge]

    steps:
      - name: SCM
        uses: actions/checkout@v6

      - name: Setup JDK8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: temurin

      - name: Setup JDK25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew :${{ matrix.platform }}:build

      - name: Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.platform }}/build/libs/*.jar


